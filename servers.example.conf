# SNTP 伺服器名單設定檔（範例）
#
# 用法：複製本檔為 servers.conf 後再依需求調整
#       cp servers.example.conf servers.conf
# 格式：每行一個主機名稱，依優先順序由上往下嘗試
#       # 起始為註解，空行忽略
# 覆寫路徑：設定環境變數 SNTP_SERVERS_FILE 可指定其他設定檔
# 回退：設定檔不存在或內容為空時，改用程式內建的預設名單

